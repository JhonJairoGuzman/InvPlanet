<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvPlanet - Dashboard (Recetas Manuales + Fidelización)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-globe-americas"></i>
                    <h1>InvPlanet <span class="badge badge-purple" style="margin-left: 10px; font-size: 12px;">v4.0</span></h1>
                </div>
                <div class="user-info">
                    <span id="userName">Cargando usuario...</span>
                    <button class="btn btn-danger btn-small" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Salir
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="main-content">
            <!-- Sidebar -->
            <nav class="sidebar">
                <div class="sidebar-header">
                    <h2><i class="fas fa-bars"></i> Menú Principal</h2>
                </div>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="#" class="nav-link active" data-view="dashboard">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-view="inventario">
                            <i class="fas fa-boxes"></i>
                            <span>Inventario</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-view="categorias">
                            <i class="fas fa-tags"></i>
                            <span>Categorías</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-view="ventas">
                            <i class="fas fa-cash-register"></i>
                            <span>Ventas</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-view="reportes">
                            <i class="fas fa-chart-line"></i>
                            <span>Reportes</span>
                        </a>
                    </li>
                    
                    <li class="nav-divider"></li>
                    <li class="nav-section-title">Gestión</li>
                    
                    <li class="nav-item">
                        <a href="#" class="nav-link" onclick="window.app?.mostrarModalUsuarios()">
                            <i class="fas fa-users"></i>
                            <span>Usuarios</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" onclick="window.app?.mostrarModalClientes()">
                            <i class="fas fa-user-tie"></i>
                            <span>Clientes</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" onclick="window.app?.mostrarModalProveedores()">
                            <i class="fas fa-truck"></i>
                            <span>Proveedores</span>
                        </a>
                    </li>
                    
                    <li class="nav-divider"></li>
                    <li class="nav-section-title">Operaciones</li>
                    
                    <li class="nav-item">
                        <a href="#" class="nav-link" onclick="window.app?.mostrarModalPromociones()">
                            <i class="fas fa-tags"></i>
                            <span>Promociones</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" onclick="window.app?.mostrarMapaMesas()">
                            <i class="fas fa-utensils"></i>
                            <span>Mesas</span>
                        </a>
                    </li>
                    
                    <li class="nav-divider"></li>
                    <li class="nav-section-title">Finanzas</li>
                    
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-view="gastos">
                            <i class="fas fa-money-bill-wave"></i>
                            <span>Gastos</span>
                        </a>
                    </li>
                    
                    <li class="nav-divider"></li>
                    <li class="nav-section-title">Sistema</li>
                    
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-view="configuracion">
                            <i class="fas fa-cog"></i>
                            <span>Configuración</span>
                        </a>
                    </li>
                </ul>
                
                <div class="sidebar-footer">
                    <div class="time-display">
                        <p id="currentDate"></p>
                        <p id="currentTime"></p>
                    </div>
                </div>
            </nav>

            <!-- Content Area -->
            <main class="content-area" id="mainContent">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <p>Cargando aplicación...</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
        <button class="quick-actions-btn" id="quickActionsBtn" onclick="document.getElementById('quickActionsMenu').classList.toggle('show')">
            <i class="fas fa-plus"></i>
        </button>
        <div class="quick-actions-menu" id="quickActionsMenu">
            <button onclick="if(window.app) window.app.mostrarModalNuevaVenta(); document.getElementById('quickActionsMenu').classList.remove('show')">
                <i class="fas fa-cash-register"></i> Nueva Venta
            </button>
            <button onclick="if(window.app) window.app.mostrarModalNuevoProducto(); document.getElementById('quickActionsMenu').classList.remove('show')">
                <i class="fas fa-box"></i> Nuevo Producto
            </button>
            <button onclick="if(window.app) window.app.mostrarModalNuevaReceta(); document.getElementById('quickActionsMenu').classList.remove('show')">
                <i class="fas fa-utensils" style="color: #9b59b6;"></i> Nueva Receta
            </button>
            <button onclick="if(window.app) window.app.mostrarModalNuevoGasto(); document.getElementById('quickActionsMenu').classList.remove('show')">
                <i class="fas fa-money-bill"></i> Nuevo Gasto
            </button>
            <button onclick="if(window.app) window.app.mostrarModalNuevoCliente(); document.getElementById('quickActionsMenu').classList.remove('show')">
                <i class="fas fa-user"></i> Nuevo Cliente
            </button>
            <button onclick="if(window.app) window.app.mostrarModalNuevoProveedor(); document.getElementById('quickActionsMenu').classList.remove('show')">
                <i class="fas fa-truck"></i> Nuevo Proveedor
            </button>
            <button onclick="if(window.app) window.app.mostrarModalNuevaPromocion(); document.getElementById('quickActionsMenu').classList.remove('show')">
                <i class="fas fa-tag"></i> Nueva Promoción
            </button>
        </div>
    </div>

    <!-- Modal Container -->
    <div id="modalContainer"></div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // ============================================
        // INICIALIZACIÓN MEJORADA - SIN CONFLICTOS
        // ============================================
        
        (function() {
            console.log('🚀 Iniciando InvPlanet v4.0...');
            
            // Variables de control
            let initialized = false;
            let loadAttempts = 0;
            const maxAttempts = 10;
            
            // Función para mostrar mensajes
            window.mostrarMensaje = function(mensaje, tipo = 'info') {
                const mensajeDiv = document.createElement('div');
                mensajeDiv.className = `mensaje-flotante ${tipo}`;
                mensajeDiv.innerHTML = `
                    <i class="fas fa-${tipo === 'success' ? 'check-circle' : tipo === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                    <span>${mensaje}</span>
                `;
                document.body.appendChild(mensajeDiv);
                setTimeout(() => mensajeDiv.remove(), 3000);
            };
            
            // Verificar scripts
            function verificarScripts() {
                const checks = {
                    storage: typeof storage !== 'undefined',
                    auth: typeof checkSession === 'function',
                    app: typeof app !== 'undefined'
                };
                
                console.log('📋 Verificación de scripts:', checks);
                return checks.storage && checks.auth && checks.app;
            }
            
            // Inicializar cuando todo esté listo
            function intentarInicializar() {
                if (initialized) return true;
                
                loadAttempts++;
                console.log(`⏳ Intento ${loadAttempts} de inicialización...`);
                
                if (!verificarScripts()) {
                    if (loadAttempts < maxAttempts) {
                        setTimeout(intentarInicializar, 500);
                        return false;
                    } else {
                        document.getElementById('mainContent').innerHTML = `
                            <div class="error-view">
                                <i class="fas fa-exclamation-triangle fa-3x"></i>
                                <h3>Error de Carga</h3>
                                <p>No se pudieron cargar los scripts necesarios.</p>
                                <button class="btn btn-primary" onclick="location.reload()">
                                    <i class="fas fa-redo"></i> Recargar
                                </button>
                            </div>
                        `;
                        return false;
                    }
                }
                
                try {
                    // Verificar sesión
                    const session = typeof checkSession === 'function' ? checkSession() : 
                                   localStorage.getItem('invplanet_session') !== null;
                    
                    if (!session) {
                        window.location.href = 'index.html';
                        return false;
                    }
                    
                    // Actualizar información de usuario
                    const user = typeof getCurrentUser === 'function' ? getCurrentUser() : 
                                JSON.parse(localStorage.getItem('invplanet_session') || '{}');
                    
                    const userNameElement = document.getElementById('userName');
                    if (userNameElement) {
                        userNameElement.textContent = `Bienvenido, ${user.nombre || user.username || 'Usuario'}`;
                    }
                    
                    // Actualizar fecha y hora
                    function updateDateTime() {
                        const now = new Date();
                        const dateEl = document.getElementById('currentDate');
                        const timeEl = document.getElementById('currentTime');
                        if (dateEl) {
                            dateEl.textContent = now.toLocaleDateString('es-ES', {
                                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                            });
                        }
                        if (timeEl) {
                            timeEl.textContent = now.toLocaleTimeString('es-ES', {
                                hour: '2-digit', minute: '2-digit', second: '2-digit'
                            });
                        }
                    }
                    updateDateTime();
                    setInterval(updateDateTime, 1000);
                    
                    // Configurar navegación
                    const navLinks = document.querySelectorAll('.nav-link[data-view]');
                    navLinks.forEach(link => {
                        link.addEventListener('click', function(e) {
                            e.preventDefault();
                            navLinks.forEach(l => l.classList.remove('active'));
                            this.classList.add('active');
                            const view = this.getAttribute('data-view');
                            if (window.app && window.app.loadView) {
                                window.app.loadView(view);
                            }
                        });
                    });
                    
                    // Configurar logout
                    document.getElementById('logoutBtn')?.addEventListener('click', function(e) {
                        e.preventDefault();
                        if (confirm('¿Estás seguro que deseas salir?')) {
                            if (typeof logout === 'function') {
                                logout();
                            } else {
                                localStorage.removeItem('invplanet_session');
                                window.location.href = 'index.html';
                            }
                        }
                    });
                    
                    // Cerrar menú al hacer clic fuera
                    document.addEventListener('click', function(e) {
                        const menu = document.getElementById('quickActionsMenu');
                        const btn = document.getElementById('quickActionsBtn');
                        if (btn && menu && !btn.contains(e.target) && !menu.contains(e.target)) {
                            menu.classList.remove('show');
                        }
                    });
                    
                    // Inicializar la aplicación
                    if (window.app && window.app.initializeApp) {
                        console.log('🔄 Inicializando app...');
                        const success = window.app.initializeApp();
                        
                        if (success) {
                            console.log('✅ App inicializada correctamente');
                            initialized = true;
                            
                            // Cargar dashboard por defecto
                            setTimeout(() => {
                                if (window.app && window.app.loadView) {
                                    window.app.loadView('dashboard');
                                }
                            }, 100);
                        }
                    }
                    
                    return true;
                    
                } catch (error) {
                    console.error('❌ Error en inicialización:', error);
                    document.getElementById('mainContent').innerHTML = `
                        <div class="error-view">
                            <i class="fas fa-exclamation-triangle fa-3x"></i>
                            <h3>Error</h3>
                            <p>${error.message}</p>
                            <button class="btn btn-primary" onclick="location.reload()">
                                <i class="fas fa-redo"></i> Recargar
                            </button>
                        </div>
                    `;
                    return false;
                }
            }
            
            // Iniciar cuando el DOM esté listo
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => setTimeout(intentarInicializar, 100));
            } else {
                setTimeout(intentarInicializar, 100);
            }
            
            // Funciones globales (con verificación)
            window.mostrarModalNuevoProducto = () => window.app?.mostrarModalNuevoProducto?.() || window.mostrarMensaje('Función no disponible', 'info');
            window.mostrarModalNuevaCategoria = () => window.app?.mostrarModalNuevaCategoria?.() || window.mostrarMensaje('Función no disponible', 'info');
            window.mostrarModalNuevaVenta = () => window.app?.mostrarModalNuevaVenta?.() || window.mostrarMensaje('Función no disponible', 'info');
            window.mostrarModalNuevoGasto = () => window.app?.mostrarModalNuevoGasto?.() || window.mostrarMensaje('Función no disponible', 'info');
            window.mostrarModalNuevoCliente = () => window.app?.mostrarModalNuevoCliente?.() || window.mostrarMensaje('Función no disponible', 'info');
            window.mostrarModalNuevoProveedor = () => window.app?.mostrarModalNuevoProveedor?.() || window.mostrarMensaje('Función no disponible', 'info');
            window.mostrarModalNuevaPromocion = () => window.app?.mostrarModalNuevaPromocion?.() || window.mostrarMensaje('Función no disponible', 'info');
            window.mostrarMapaMesas = () => window.app?.mostrarMapaMesas?.() || window.mostrarMensaje('Función no disponible', 'info');
            window.mostrarModalNuevaReceta = (id) => window.app?.mostrarModalNuevaReceta?.(id) || window.mostrarMensaje('Función de recetas no disponible', 'info');
            
            window.cerrarModal = (modalId) => {
                const modal = document.getElementById(modalId);
                if (modal) modal.remove();
            };
            
            // Funciones de depuración
            window.mostrarEstadoApp = function() {
                console.log('=== ESTADO DE LA APP ===');
                console.log('App:', !!window.app);
                console.log('Storage:', !!window.storage);
                console.log('Auth:', typeof checkSession === 'function');
                console.log('Recetas:', window.app?.recetas?.length || 0);
                console.log('Clientes:', window.app?.clientes?.length || 0);
                console.log('Mesas:', window.app?.mesas?.length || 0);
            };
            
            window.mostrarRecetas = function() {
                if (!window.app?.recetas?.length) {
                    console.log('No hay recetas');
                    return;
                }
                window.app.recetas.forEach((r, i) => {
                    console.log(`Receta ${i+1}:`, r);
                });
            };
            
            console.log('%c✅ Dashboard listo', 'color: #27ae60; font-weight: bold');
        })();
    </script>
</body>
</html>
